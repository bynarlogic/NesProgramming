MEMORY {
    HEADER:  start=$00,   size=$10,   file=%O, fill=yes, fillval=$00;
    PRG:     start=$8000, size=$7FFA, file=%O, fill=yes, fillval=$FF;
    VECTORS: start=$FFFA, size=$6,    file=%O, fill=yes, fillval=$FF;
    CHR_BG:  start=$0000, size=$1000, file=%O, fill=yes, fillval=$00;
    CHR_SPR: start=$1000, size=$1000, file=%O, fill=yes, fillval=$00;
}

SEGMENTS {
    HEADER:  load=HEADER,  type=ro;
    CODE:    load=PRG,     type=ro;
    VECTORS: load=VECTORS, type=ro;
    CHARS_BG: load=CHR_BG,     type=ro;
    CHARS_SPR: load=CHR_SPR,     type=ro;
}
